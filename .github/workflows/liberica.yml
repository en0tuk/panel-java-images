name: Build Liberica Images

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: write

jobs:
  build:
    name: "liberica:${{ matrix.type }}-${{ matrix.version }}-${{ matrix.libc }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        type: [jre, jdk]
        version: [8, 11, 17, 21, 25]
        libc: [glibc, musl]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta_liberica
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/liberica
          tags: |
            ${{ matrix.type }}-${{ matrix.version }}-${{ matrix.libc }}

      - name: Build and push images
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Liberica/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_liberica.outputs.tags }}
          labels: ${{ steps.meta_liberica.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.repository_owner }}
            JAVA_TYPE=${{ matrix.type }}
            JAVA_VERSION=${{ matrix.version }}
            LIBC_TYPE=${{ matrix.libc }}
